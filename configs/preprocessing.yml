  - 'TOW'
  - 'utcTimeMillis'
  - 'Environment'
  - 'Scenario'
  - 'Session'
  - 'DeviceName'
  - 'ConstellationType'
  - 'Svid'
  - 'sv_id'
  - 'FreqBand'
  - 'CarrierFrequencyHz'
  - 'CarrierFrequencyHzRounded'
  - 'CodeType'
  - 'SignalBand'
  - 'signal_id'
  - 'SignalEpochCount'
  - 'SpoofingType'
  - 'Label'
  - 'LabelStatus'
  - 'LabelSource'
  - 'AgcDbMissing'
  - 'SourceFile'
