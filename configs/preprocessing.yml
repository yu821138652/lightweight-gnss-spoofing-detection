# Unified preprocessing configuration for this local workspace.

paths:
  input_dir: './data_raw'
  output_csv: './output/processed_gnss_data.csv'
  default_environment: 'playground'

file_patterns:
  - "gnss_log_*.txt"
  - "log_mimir_*.txt"

device_model_map:
  "NOH-AN01": "HUAWEI_Mate40"
  "Google Pixel Watch 2": "Google_Pixel_Watch2"
  "Google Pixel Watch": "Google_Pixel_Watch1"
  "23078RKD5C": "RedMi_K60"
  "MI 8": "XiaoMi_MI8"
  "Pixel 6": "Google_Pixel6"

device_folder_map:
  "HUAWEI": "HUAWEI_Mate40"
  "HUAWEI_Mate40": "HUAWEI_Mate40"
  "Xiaomi_MI_8": "XiaoMi_MI8"
  "XiaoMi_MI8": "XiaoMi_MI8"
  "Xiaomi_23078RKD5C": "RedMi_K60"
  "RedMi_K60": "RedMi_K60"
  "watch1": "Google_Pixel_Watch1"
  "watch2": "Google_Pixel_Watch2"
  "Google_Pixel_Watch1": "Google_Pixel_Watch1"
  "Google_Pixel_Watch2": "Google_Pixel_Watch2"
  "谷歌pix6": "Google_Pixel6"
  "Google_Pixel6": "Google_Pixel6"

labeling:
  # Legacy scenario intervals are only valid for playground recordings.
  scenario_fallback_environments:
    - playground

  # Session-specific labels take precedence. Add every reviewed new_building
  # recording here; an empty interval list means the session was reviewed as
  # normal. Unlisted new_building sessions are emitted with LabelStatus=
  # needs_review and must not enter formal training.
  session_spoofing_tow_intervals:
    new_building:
      st_L1:
        "2025.07.29.19.22_新主楼":
          status: reviewed
          intervals: [[214396, 215011]]
      st_L5:
        "2025.07.29.20.16_新主楼":
          status: reviewed
          intervals: [[217683, 218305]]
        # 该记录从同一段 L5 欺骗事件进行中开始采集。
        "2025.07.29.20.36_新主楼":
          status: reviewed
          intervals: [[217683, 218305]]
      st_L_15:
        "2025.07.29.18.42_新主楼":
          status: reviewed
          intervals: [[212025, 212648]]
      dy_L1:
        "2025.07.29.20.04_新主楼":
          status: reviewed
          intervals: [[216554, 216586]]
      dy_L5:
        "2025.07.29.20.52_新主楼":
          status: reviewed
          intervals: [[219394, 219412]]
      dy_L_15:
        "2025.07.29.17.32_新主楼":
          status: reviewed
          intervals: [[207345, 207364]]
        "2025.07.29.18.27_新主楼":
          status: reviewed
          intervals: [[210685, 210708]]
        # Two overlapping manual entries were consolidated to their union.
        "2025.07.29.18.33_新主楼":
          status: reviewed
          intervals: [[211060, 211083]]

  spoofing_tow_intervals:
    st_L1: [[262228, 262860]]
    st_L5: [[266310, 267054]]
    st_L_15: [[258028, 258653]]
    normal: []
    dy_L1: [[263995, 264050], [264690, 264740], [265015, 265065], [481730, 481940], [482350, 482420], [482650, 482750]]
    dy_L5: [[269190, 269220], [268960, 268990], [269434, 269470], [483200, 483320]]
    dy_L_15: [[261285, 261310], [260025, 260050], [260970, 261040]]

  spoofing_type_to_label:
    normal: 0
    st_L1: 1
    st_L5: 2
    st_L_15: 3
    dy_L1: 1
    dy_L5: 2
    dy_L_15: 3

final_columns:
