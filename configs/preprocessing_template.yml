# configs/preprocessing.yml
# Unified preprocessing configuration for STAR-Mamba pipeline

paths:
  input_dir: './data_raw'
  output_csv: './output/processed_gnss_data.csv'
  default_environment: 'playground'

file_patterns:
  - "gnss_log_*.txt"
  - "log_mimir_*.txt"

device_model_map:
  "NOH-AN01": "HUAWEI_Mate40"
  "Google Pixel Watch": "Google_Pixel_Watch1"
  "Google Pixel Watch 2": "Google_Pixel_Watch2"
  "23078RKD5C": "RedMi_K60"
  "MI 8": "XiaoMi_MI8"
  "Pixel 6": "Google_Pixel6"

labeling:
  # Use the same explicit Environment/Scenario/Session schema for every data
  # source. Unlisted Sessions remain needs_review and are excluded by default.
  session_spoofing_tow_intervals:
    playground: {}
    new_building: {}

  # Example:
  # session_spoofing_tow_intervals:
  #   playground:
  #     st_L1:
  #       "session_directory_name":
  #         status: reviewed
  #         intervals: [[start_tow, end_tow]]
  
  spoofing_type_to_label:
    normal: 0
    st_L1: 1
    st_L5: 2
    st_L_15: 3
    dy_L1: 1
    dy_L5: 2
    dy_L_15: 3

final_columns:
  - 'TimeNanos'
  - 'TOW'
  - 'utcTimeMillis'
  - 'Environment'
  - 'Scenario'
  - 'Session'
  - 'DeviceName'
  - 'ConstellationType'
  - 'Svid'
  - 'sv_id'
  - 'FreqBand'
  - 'CarrierFrequencyHz'
  - 'CarrierFrequencyHzRounded'
  - 'CodeType'
  - 'SignalBand'
  - 'signal_id'
  - 'SignalEpochCount'
  - 'SpoofingType'
  - 'Label'
  - 'LabelStatus'
  - 'LabelSource'
  - 'AgcDbMissing'
  - 'SourceFile'
  - 'SourceRelativePath'
  - 'Cn0DbHz'
  - 'Cn0DbHz_dt'
  - 'Cn0DbHz_std'
  - 'AgcDb'
  - 'ReceivedSvTimeUncertaintyNanos'
  - 'PseudorangeRateUncertaintyMetersPerSecond'
  - 'AccumulatedDeltaRangeUncertaintyMeters'

