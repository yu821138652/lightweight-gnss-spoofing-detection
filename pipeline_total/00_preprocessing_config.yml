# configs/preprocessing.yml
# Unified preprocessing configuration for STAR-Mamba pipeline

paths:
  input_dir: './data_raw'  # Or 'Addition/ConstellationFormer/data_raw' if using old structure
  output_csv: './output/processed_gnss_data.csv'

file_patterns:
  - "gnss_log_*.txt"
  - "log_mimir_*.txt"

device_model_map:
  "NOH-AN01": "HUAWEI_Mate40"
  "Google Pixel Watch": "Google_Pixel_Watch1"
  "Google Pixel Watch 2": "Google_Pixel_Watch2"
  "23078RKD5C": "RedMi_K60"
  "MI 8": "XiaoMi_MI8"
  "Pixel 6": "Google_Pixel6"

labeling:
  spoofing_tow_intervals:
    # --- 静态数据 (Static) ---
    st_L1: [[262228, 262860]]
    st_L5: [[266310, 267054]]
    st_L_15: [[258028, 258653]]
    normal: []
    # --- 动态数据 (Dynamic) - 包含 2022 新增数据 ---
    dy_L1: [[263995, 264050], [264690, 264740], [265015, 265065], [481730, 481940], [482350, 482420], [482650, 482750]]
    dy_L5: [[269190, 269220], [268960, 268990], [269434, 269470], [483200, 483320]]
    dy_L_15: [[261285, 261310], [260025, 260050], [260970, 261040]]
  
  spoofing_type_to_label:
    normal: 0
    st_L1: 1
    st_L5: 2
    st_L_15: 3
    dy_L1: 1
    dy_L5: 2
    dy_L_15: 3

final_columns:
  - 'TimeNanos'
  - 'TOW'
  - 'sv_id'
  - 'DeviceName'
  - 'Label'
  - 'SpoofingType'
  - 'FreqBand'
  - 'Cn0DbHz'
  - 'Cn0DbHz_dt'
  - 'Cn0DbHz_std'
  - 'AgcDb'
  - 'ReceivedSvTimeUncertaintyNanos'
  - 'PseudorangeRateUncertaintyMetersPerSecond'
  - 'AccumulatedDeltaRangeUncertaintyMeters'

